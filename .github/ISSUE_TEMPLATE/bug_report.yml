name: Bug Report
description: Something isn't working
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run `ai-multi-review ...`
        2. See error
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Other)
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: dropdown
    id: reviewers
    attributes:
      label: Reviewer(s) used
      multiple: true
      options:
        - claude
        - gemini
        - openai
        - codex
        - other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Run: `cat ~/.config/ai-multi-review/VERSION`"
      placeholder: v0.2.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Attach relevant output from `~/.config/ai-multi-review/logs/`
      render: shell
