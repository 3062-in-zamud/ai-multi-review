name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install shellcheck (ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y shellcheck
      - name: Install shellcheck (macos)
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - run: make lint

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps (ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y jq
      - name: Install deps (macos)
        if: runner.os == 'macOS'
        run: brew install jq
      - run: pip install pytest
      - run: make test
